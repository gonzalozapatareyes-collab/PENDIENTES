<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes Equipo KAM · Amplifica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#4548FF; --yellow:#F7DC4B; --dark-blue:#121755;
    --dark-gray:#1D1D1F; --light-gray:#E1E0E0; --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--dark-gray);background:#FAFAFC;font-size:14.5px;line-height:1.55;}
  .wrap{max-width:980px;margin:0 auto;padding:0 28px 64px;}

  header{background:var(--dark-blue);color:var(--white);padding:26px 0 30px;border-bottom:6px solid var(--yellow);}
  header .wrap{padding-bottom:0;}
  .wordmark{display:flex;align-items:center;gap:9px;margin-bottom:18px;}
  .wordmark .dot{width:14px;height:14px;border-radius:50%;background:var(--yellow);}
  .wordmark span{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:lowercase;font-size:24px;}
  .wordmark span b{color:var(--yellow);}
  .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:14px;color:var(--yellow);margin-bottom:6px;}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:44px;line-height:1.05;text-transform:uppercase;}
  header .sub{margin-top:12px;font-size:13px;opacity:.85;}

  /* CONTROLES STICKY */
  .controls{position:sticky;top:0;z-index:50;background:#FAFAFCEE;backdrop-filter:blur(6px);border-bottom:1px solid var(--light-gray);}
  .controls .wrap{padding-top:14px;padding-bottom:12px;}
  .weekrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
  .weekbadge{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:16px;color:var(--dark-blue);background:var(--yellow);padding:4px 12px;border-radius:6px;}
  .weekmeta{font-size:12.5px;color:#6b6b6e;}
  .btnrow{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
  button.act{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;border:1px solid var(--blue);background:var(--white);color:var(--blue);border-radius:7px;padding:6px 12px;cursor:pointer;}
  button.act:hover{background:#EEEEFF;}
  button.act.ghost{border-color:var(--light-gray);color:#6b6b6e;}
  button.act.ghost:hover{background:#f0f0f2;}
  .kambar{display:flex;gap:7px;flex-wrap:wrap;}
  .kam-chip{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:13px;border:1px solid var(--light-gray);background:var(--white);color:var(--dark-blue);border-radius:999px;padding:4px 12px;cursor:pointer;}
  .kam-chip b{font-family:'Inter',sans-serif;font-weight:700;font-size:11px;opacity:.6;margin-left:3px;}
  .kam-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .kam-chip.active b{opacity:.8;}

  #banner{display:none;background:#FFF6D6;border:1px solid var(--yellow);border-radius:10px;padding:12px 16px;margin-top:18px;font-size:13.5px;color:var(--dark-blue);}
  #banner button{margin-left:10px;}

  section{margin-bottom:30px;}
  h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:25px;letter-spacing:.02em;color:var(--dark-blue);display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  h2::after{content:"";flex:1;height:2px;background:var(--light-gray);}
  h2 .count{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;background:var(--blue);color:#fff;border-radius:999px;padding:3px 10px;}
  section.urgente h2{color:var(--blue);}
  section.urgente h2 .count{background:var(--yellow);color:var(--dark-blue);}

  .card{background:var(--white);border:1px solid var(--light-gray);border-left:4px solid var(--blue);border-radius:10px;padding:14px 18px;margin-bottom:10px;}
  .card.urgente{border-left-color:var(--yellow);}
  .card .seller{font-weight:700;color:var(--dark-blue);}
  .card .kam{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;font-size:12.5px;letter-spacing:.08em;color:var(--blue);background:#EEEEFF;border-radius:4px;padding:1px 8px;margin-left:8px;vertical-align:middle;}
  .card p{margin-top:4px;}
  .tag-date{display:inline-block;background:var(--yellow);color:var(--dark-blue);font-weight:700;font-size:12px;border-radius:4px;padding:1px 8px;margin-left:6px;}
  .chip{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:11px;border-radius:4px;padding:1px 7px;margin-left:6px;vertical-align:middle;}
  .chip.nuevo{background:var(--blue);color:#fff;}
  .chip.arr{background:#EDEDF0;color:#5a5a60;}
  .chip.crit{background:#ffe3e3;color:#b42318;border:1px solid #f7bcbc;}
  .chip.sinresp{background:var(--yellow);color:var(--dark-blue);}
  .chip.block{background:var(--light-gray);color:#4a4a4f;}

  .track-ctrl{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:11px;padding-top:9px;border-top:1px dashed var(--light-gray);font-size:12.5px;}
  .track-ctrl .lev{display:flex;align-items:center;gap:7px;color:#6b6b6e;}
  .track-ctrl .lev label{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dark-blue);}
  .track-ctrl input[type=date]{border:1px solid var(--light-gray);border-radius:5px;padding:3px 8px;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--dark-gray);}
  .track-ctrl input[type=date]:focus{outline:2px solid var(--blue);border-color:var(--blue);}
  .track-ctrl .done-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;margin-left:auto;font-weight:600;color:var(--dark-blue);user-select:none;}
  .track-ctrl .done-toggle input{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;}

  .card.done{opacity:.6;background:#F4F4F6;border-left-color:#9a9aa0;}
  .card.done .seller,.card.done p,.card.done .kam{text-decoration:line-through;}

  #cerrados-wrap h2{color:#6b6b6e;}
  #cerrados-wrap h2 .count{background:#9a9aa0;}
  #cerrados-empty{color:#8a8a8f;font-size:13px;font-style:italic;padding:4px 2px;}

  /* ALTA DE PENDIENTES */
  .addbox{background:var(--white);border:1px dashed var(--blue);border-radius:12px;padding:18px 20px;margin-top:8px;}
  .addbox h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:20px;color:var(--dark-blue);margin-bottom:12px;}
  .addgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
  .addgrid .full{grid-column:1 / -1;}
  .addbox label.fl{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--dark-blue);margin-bottom:4px;}
  .addbox input,.addbox select,.addbox textarea{width:100%;border:1px solid var(--light-gray);border-radius:7px;padding:8px 10px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--dark-gray);background:#fff;}
  .addbox input:focus,.addbox select:focus,.addbox textarea:focus{outline:2px solid var(--blue);border-color:var(--blue);}
  .addbox textarea{resize:vertical;min-height:56px;}
  .addbox .addactions{margin-top:14px;}
  button.primary{font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;border:none;background:var(--blue);color:#fff;border-radius:8px;padding:9px 20px;cursor:pointer;}
  button.primary:hover{background:#3538d6;}

  footer{margin-top:44px;padding-top:18px;border-top:2px solid var(--light-gray);font-size:12.5px;color:#6b6b6e;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  footer .brand{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dark-blue);}

  @media (max-width:600px){
    h1{font-size:34px;} .wrap{padding:0 16px 48px;}
    .addgrid{grid-template-columns:1fr;}
    .track-ctrl .done-toggle{margin-left:0;}
    .btnrow{margin-left:0;width:100%;}
  }
</style>
</head>

  // ---- fechas ----
  function pad(n){return (n<10?'0':'')+n;}
  function toIso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function parseIso(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function addDays(iso,n){var d=parseIso(iso);d.setDate(d.getDate()+n);return toIso(d);}
  function fmt(iso){if(!iso)return '';var p=iso.split('-');return p[2]+'/'+p[1];}
  function mondayIso(date){var d=new Date(date.getFullYear(),date.getMonth(),date.getDate());var wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return toIso(d);}

      if(f==='crit') out+='<span class="chip crit">Ligado a critico</span>';
      else if(f==='sinresp') out+='<span class="chip sinresp">Sin resp.</span>';
      else if(f==='block') out+='<span class="chip block">Bloqueado por 3os</span>';
    });
    return out;
  }
  function cardHtml(x){

      +'<span class="kam">'+esc(x.kam)+'</span>'
      + chipHtml(x)
      + (x.desc?'<p>'+esc(x.desc)+'</p>':'')
      +'<div class="track-ctrl">'
        +'<span class="lev"><label>Levantado</label>'
        +'<input type="date" data-id="'+x.id+'" data-role="lev" value="'+esc(x.levantado||'')+'"></span>'
        +'<label class="done-toggle"><input type="checkbox" data-id="'+x.id+'" data-role="done"'+(x.cerrado?' checked':'')+'>Cerrado</label>'
      +'</div></div>';
  }

  function renderKamBar(){
    var counts={},total=0; KAMS.forEach(function(k){counts[k]=0;});
    items.forEach(function(x){ if(x.cerrado)return; total++; KAMS.forEach(function(k){ if(kamMatch(x,k)) counts[k]++; }); });
    var h='<button class="kam-chip'+(activeKam==='Todos'?' active':'')+'" data-kam="Todos">Todos <b>'+total+'</b></button>';
    KAMS.forEach(function(k){ h+='<button class="kam-chip'+(activeKam===k?' active':'')+'" data-kam="'+k+'">'+k+' <b>'+counts[k]+'</b></button>'; });
    kamBar.innerHTML=h;
  }
  function renderWeek(){
    var mon=state.semanaActual, fri=addDays(mon,4);
    weekBadge.textContent='Semana del '+fmt(mon)+' al '+fmt(fri);
    var today=todayIso(), msg;
    if(today<mon) msg='Reunion de levantamiento: lunes '+fmt(mon)+'.';
    else if(today<=fri){ var dias=Math.round((parseIso(fri)-parseIso(today))/86400000); msg='En curso, cierre el viernes '+fmt(fri)+' ('+(dias===0?'hoy':'quedan '+dias+' dia'+(dias===1?'':'s'))+').'; }
    else msg='Semana cerrada. Al avanzar, los cerrados salen y los abiertos quedan como arrastre.';
    weekMeta.textContent=msg;
    footNote.textContent='Pendientes Equipo KAM · semana del '+fmt(mon)+(CLOUD?' · sincronizado en la nube':' · guardado en este navegador');
  }
  function renderBanner(){
    var realMon=mondayIso(new Date());
    if(realMon>state.semanaActual){
      banner.style.display='block';

      document.getElementById('rollBtn').onclick=function(){ rollover(realMon); };
    } else banner.style.display='none';
  }
  function render(){
    renderKamBar(); renderWeek(); renderBanner();
    var h='';
    CATS.forEach(function(c){
      var list=items.filter(function(x){return x.cat===c.key && !x.cerrado && passFilter(x);});
      if(!list.length) return;
      h+='<section'+(c.urgent?' class="urgente"':'')+'><h2>'+c.label+' <span class="count">'+list.length+'</span></h2>';
      list.forEach(function(x){ h+=cardHtml(x); });
      h+='</section>';
    });
    var cer=items.filter(function(x){return x.cerrado && passFilter(x);});
    h+='<section id="cerrados-wrap"><h2>Cerrados <span class="count">'+cer.length+'</span></h2>';
    if(!cer.length) h+='<div id="cerrados-empty">Aun no hay pendientes cerrados. Marca la casilla de un item para tacharlo y bajarlo aqui. Al avanzar de semana, los cerrados se quitan de la vista.</div>';
    cer.forEach(function(x){ h+=cardHtml(x); });
    h+='</section>';
    board.innerHTML=h;
  }

  board.addEventListener('change', function(e){
    var t=e.target, id=t.getAttribute('data-id'); if(!id) return;

    if(!x) return;
    var role=t.getAttribute('data-role');
    if(role==='done'){ x.cerrado=t.checked; x.cerradoFecha=t.checked?todayIso():null; save(); render(); }
    else if(role==='lev'){ x.levantado=t.value; save(); }
  });

    if(!confirm('Avanzar a la semana del '+fmt(target)+'?\n\nSe quitaran de la vista los pendientes marcados como cerrados y se conservaran los abiertos como arrastre de la semana anterior.')) return;
    var removed=items.filter(function(x){return x.cerrado;}).map(function(x){return x.id;});
    items=items.filter(function(x){return !x.cerrado;});
    state.semanaActual=target;
    if(CLOUD){ if(removed.length){ sb.from('kam_items').delete().in('id',removed).then(function(){ cloudSyncAll(); }); } else { cloudSyncAll(); } }
    else saveLocal();
    render();
  }
  document.getElementById('advanceBtn').onclick=function(){ rollover(addDays(state.semanaActual,7)); };
  document.getElementById('resetBtn').onclick=function(){
    if(!confirm('Restablecer a los datos originales de la semana del '+fmt(WK_NOW)+'?'+(CLOUD?' Esto reemplaza los datos compartidos para todo el equipo.':' Se perderan los cambios de este navegador.'))) return;
    if(CLOUD){ sb.from('kam_items').delete().neq('id','__none__').then(function(){ items=seedCopy(); state.semanaActual=WK_NOW; cloudSyncAll(); render(); }); }
    else { try{ localStorage.removeItem(KEY); }catch(e){} location.reload(); }
  };

  // ---- alta ----
  function setupAdd(){
    var fKam=document.getElementById('f-kam'), fCat=document.getElementById('f-cat');
    KAMS.forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=k; fKam.appendChild(o); });
    CATS.forEach(function(c){ var o=document.createElement('option'); o.value=c.key; o.textContent=c.label.replace('🔴 ',''); fCat.appendChild(o); });
    fCat.value='operativo';
    document.getElementById('f-lev').value=state.semanaActual;
    document.getElementById('addBtn').onclick=function(){
      var titulo=document.getElementById('f-titulo').value.trim();
      if(!titulo){ alert('El pendiente necesita un titulo.'); return; }
      var prio=document.getElementById('f-prio').value;
      var cat=(prio==='si')?'urgente':document.getElementById('f-cat').value;
      var x={ id:'u'+Date.now(), titulo:titulo, kam:document.getElementById('f-kam').value, cat:cat,
        desc:document.getElementById('f-desc').value.trim(),
        levantado:document.getElementById('f-lev').value||state.semanaActual,
        tagDate:'', flags:[], semanaOrigen:state.semanaActual, cerrado:false, cerradoFecha:null };
      items.push(x); save();
      document.getElementById('f-titulo').value=''; document.getElementById('f-desc').value='';
      activeKam='Todos'; render();
      window.scrollTo({top:0,behavior:'smooth'});
    };
  }

  // ---- modo ----
  function modeLocal(){ modebar.style.display='block'; modebar.className='local'; modebar.textContent='Modo local en este navegador, aun sin sincronizar. Pega tus credenciales de Supabase dentro del archivo para que el equipo vea lo mismo.'; }
  function modeCloud(){ modebar.style.display='block'; modebar.className='cloud'; modebar.textContent='Sincronizado en la nube. Lo que edites lo ve el equipo y lo del equipo lo ves tu.'; }
  function modeErr(msg){ modebar.style.display='block'; modebar.className='err'; modebar.textContent='No se pudo conectar a la nube ('+msg+'). Mostrando datos locales; revisa la URL, la key y las politicas de la tabla en Supabase.'; }

  // ---- arranque ----
  function boot(){
    setupAdd();
    if(CLOUD){
      modeCloud();
      cloudFetchAll(function(err){
        if(err){ modeErr(err.message||'error'); if(!items.length) items=seedCopy(); render(); return; }
        if(!items.length){ items=seedCopy(); cloudSyncAll(); }
        render(); setInterval(pollCloud, 12000);
      });
    } else {
      if(!loadLocal()){ items=seedCopy(); saveLocal(); }
      modeLocal(); render();
    }
  }
  boot();
})();</script>
</body>
</html>
